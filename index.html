<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelUI Emulator (Android 15)</title>
    <style>
        :root {
            --android-radius: 28px;
            --bg-color: #f8f9fa;
            --text-color: #1a1b1f;
            --sec-text: #44474e;
            --border-color: #e1e2ec;
            --accent-color: #e3e3e4;
            --surface-variant: #edeef3;
        }

        .dark-theme {
            --bg-color: #141316;
            --text-color: #e4e2e6;
            --sec-text: #c8c5ca;
            --border-color: #47464a;
            --accent-color: #2c2c2e;
            --surface-variant: #252427;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #121214;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Phone Frame */
        .phone-frame {
            width: 300px;
            height: 630px;
            background: #000;
            border-radius: 38px;
            padding: 10px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 0 0 3px #2c2c2e;
            position: relative;
            overflow: hidden;
        }

        /* Screen Container */
        .screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: var(--android-radius);
            position: relative;
            overflow: hidden;
        }

        /* Camera Punch Hole - Shifted UP and made BIGGER */
        .camera {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: #000;
            border-radius: 50%;
            z-index: 120;
            pointer-events: none;
        }

        /* Custom Wallpaper with blur transitions */
        .wallpaper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.pinimg.com/736x/25/ac/b4/25acb4c8797511366a6fc3da8e453d75.jpg') center/cover;
            transition: transform 0.5s cubic-bezier(0.15, 0.85, 0.15, 1), filter 0.4s ease;
            transform: scale(1);
            filter: blur(0px);
            z-index: 1;
        }

        .screen.app-open .wallpaper {
            transform: scale(1.08);
            filter: blur(15px);
        }

        /* Home Screen UI Layout */
        .home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            padding: 50px 18px 30px 18px;
        }

        /* App Grid Layout Container */
        .app-grid {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: absolute; 
            z-index: 5;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        /* Default starting positions on the workspace canvas */
        #settings-trigger { left: 10px; top: 20px; }
        #app2-trigger { left: 85px; top: 20px; }

        .app-icon-wrapper.dragging {
            z-index: 999;
            pointer-events: none;
            transform: scale(1.15);
            opacity: 0.9;
            transition: none !important;
        }

        .app-icon-wrapper.hold-active {
            transform: scale(1.1);
        }

        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            background-size: cover;
            background-position: center;
        }

        /* custom PNG image asset integration */
        #settings-trigger .app-icon {
            background-image: url('https://static.wikia.nocookie.net/logopedia/images/2/27/Settings_android-8.png/revision/latest?cb=20240930165358');
            background-color: transparent;
            box-shadow: none;
        }

        #app2-trigger .app-icon {
            background: #a8c7fa;
        }

        #app2-trigger .app-icon svg {
            width: 26px;
            height: 26px;
            fill: #3c4043;
        }

        .app-label {
            color: white;
            font-size: 10px;
            margin-top: 6px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
            text-align: center;
            width: 60px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Fixed Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 11px;
            font-weight: 500;
            padding: 0 14px;
            position: absolute;
            top: 8px;
            left: 0;
            width: 100%;
            z-index: 130;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .screen.app-open:not(.dark-active) .status-bar {
            color: #1a1b1f;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-icons svg {
            width: 13px;
            height: 13px;
            fill: currentColor;
        }

        /* App Window Base Styles */
        .app-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 10;
            border-radius: var(--android-radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            pointer-events: none;
            opacity: 0;
            will-change: transform, opacity, border-radius;
            transform-origin: top left;
            transition: 
                transform 0.45s cubic-bezier(0.15, 0.85, 0.15, 1),
                border-radius 0.45s cubic-bezier(0.15, 0.85, 0.15, 1),
                opacity 0.2s ease,
                background-color 0.3s ease;
        }

        .app-window.open {
            transform: translate(0, 0) scale(1) !important;
            border-radius: var(--android-radius) !important;
            opacity: 1;
            pointer-events: auto;
        }

        .app-window.dragging { transition: none !important; }

        /* Hidden Scrollbars Custom View Canvas */
        .app-content {
            width: 100%;
            height: 100%;
            padding: 55px 16px 40px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.2s ease;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
        }

        .app-content::-webkit-scrollbar { display: none; }
        .app-content { -ms-overflow-style: none; scrollbar-width: none; }

        .app-window.open .app-content {
            opacity: 1;
            transition-delay: 0.1s;
        }

        .settings-title {
            font-size: 24px;
            font-weight: 400;
            color: var(--text-color);
            margin-top: 5px;
        }

        .search-wrapper { position: relative; }
        .settings-search {
            width: 100%;
            background: var(--surface-variant);
            border: none;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 14px;
            color: var(--text-color);
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }

        .settings-list { display: flex; flex-direction: column; }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 4px;
            border-bottom: 1px solid var(--border-color);
        }

        .settings-item-left {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            flex-grow: 1;
        }

        .settings-item-icon {
            width: 24px;
            height: 24px;
            background: var(--surface-variant);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .settings-item-icon svg {
            width: 14px;
            height: 14px;
            fill: var(--text-color);
        }

        .settings-item-text h4 {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
        }
        .settings-item-text p {
            font-size: 11px;
            color: var(--sec-text);
            margin-top: 1px;
        }

        /* Switch components */
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
            flex-shrink: 0;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #a8c7fa; }
        input:checked + .slider:before { transform: translateX(16px); background-color: #0b57d0; }

        /* Navigation Bar & Gesture Area */
        .nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 32px;
            z-index: 140;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            background: transparent;
        }
        .nav-bar:active { cursor: grabbing; }

        .gesture-line {
            width: 60px;
            height: 4px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 2px;
            will-change: transform;
            transition: background 0.3s, transform 0.2s ease-out;
            pointer-events: none;
        }

        .screen.app-open .gesture-line { background: rgba(0, 0, 0, 0.6); }
        .screen.app-open.dark-active .gesture-line { background: rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="camera"></div>
        
        <div class="screen" id="screen">
            
            <div class="status-bar">
                <span id="status-clock">09:30</span>
                <div class="status-icons">
                    <svg viewBox="0 0 24 24"><path d="M12 21l-12-14c4.667-4.667 19.333-4.667 24 0l-12 14z"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M17 5H7c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-1 2v2H8V7h8z"/></svg>
                </div>
            </div>

            <div class="wallpaper" id="wallpaper"></div>

            <div class="home-screen">
                <div class="app-grid" id="app-grid">
                    <div class="app-icon-wrapper draggable-icon" id="settings-trigger">
                        <div class="app-icon" id="target-icon"></div>
                        <div class="app-label">Settings</div>
                    </div>

                    <div class="app-icon-wrapper draggable-icon" id="app2-trigger">
                        <div class="app-icon" id="app2-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/>
                            </svg>
                        </div>
                        <div class="app-label">App2</div>
                    </div>
                </div>
            </div>

            <div class="app-window" id="settings-app">
                <div class="app-content">
                    <h1 class="settings-title">Settings</h1>
                    
                    <div class="search-wrapper">
                        <input type="text" class="settings-search" id="search-bar" placeholder="Search settings..." autocomplete="off">
                    </div>
                    
                    <div class="settings-list" id="settings-list">
                        <div class="settings-item">
                            <div class="settings-item-left" id="net-item">
                                <div class="settings-item-icon">
                                    <svg viewBox="0 0 24 24"><path d="M12 21l-12-14c4.667-4.667 19.333-4.667 24 0l-12 14z"/></svg>
                                </div>
                                <div class="settings-item-text">
                                    <h4>Network & internet</h4>
                                    <p id="network-status">Connected to Google_Fi</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="settings-item">
                            <div class="settings-item-left" id="dark-item">
                                <div class="settings-item-icon">
                                    <svg viewBox="0 0 24 24"><path d="M12.3 2a10 10 0 0 0-1.9 19.8 10 10 0 0 0 11.5-11.5 10.3 10.3 0 0 1-9.6-8.3z"/></svg>
                                </div>
                                <div class="settings-item-text">
                                    <h4>Dark theme</h4>
                                    <p>Tweak presentation optics</p>
                                </div>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="dark-theme-toggle">
                                <span class="slider"></span>
                            </label>
                        </div>

                        <div class="settings-item">
                            <div class="settings-item-left" id="sound-item">
                                <div class="settings-item-icon">
                                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                                </div>
                                <div class="settings-item-text">
                                    <h4>Sound & vibration</h4>
                                    <p id="sound-status">Ring volume at 80%</p>
                                </div>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="sound-toggle" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="app-window" id="app2-app">
                <div class="app-content">
                    <h1 class="settings-title">App Two</h1>
                    <p style="color: var(--sec-text); font-size: 14px;">Placeholder workspace viewport content.</p>
                </div>
            </div>

            <div class="nav-bar" id="nav-bar">
                <div class="gesture-line" id="gesture-line"></div>
            </div>

        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const targetIcon = document.getElementById('target-icon');
        const app2Icon = document.getElementById('app2-icon');
        const settingsTrigger = document.getElementById('settings-trigger');
        const app2Trigger = document.getElementById('app2-trigger');
        const settingsApp = document.getElementById('settings-app');
        const app2App = document.getElementById('app2-app');
        const navBar = document.getElementById('nav-bar');
        const gestureLine = document.getElementById('gesture-line');
        const statusClock = document.getElementById('status-clock');
        
        const searchBar = document.getElementById('search-bar');
        const darkThemeToggle = document.getElementById('dark-theme-toggle');
        const soundToggle = document.getElementById('sound-toggle');
        const soundStatus = document.getElementById('sound-status');

        let activeApp = null;
        let isAppOpen = false;
        let startY = 0, currentY = 0, isDragging = false;
        let settingsTransformState = "";
        let app2TransformState = "";

        // Status Bar Clock Engine
        function updateClock() {
            const now = new Date();
            let hh = String(now.getHours()).padStart(2, '0');
            let mm = String(now.getMinutes()).padStart(2, '0');
            statusClock.textContent = `${hh}:${mm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Menu item links
        document.getElementById('net-item').addEventListener('click', () => {
            alert('Searching for nearby Wi-Fi networks...');
        });
        document.getElementById('dark-item').addEventListener('click', () => {
            darkThemeToggle.click();
        });
        document.getElementById('sound-item').addEventListener('click', () => {
            soundToggle.click();
        });

        // Dark Mode Logic
        darkThemeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                settingsApp.classList.add('dark-theme');
                app2App.classList.add('dark-theme');
                screen.classList.add('dark-active');
            } else {
                settingsApp.classList.remove('dark-theme');
                app2App.classList.remove('dark-theme');
                screen.classList.remove('dark-active');
            }
        });

        // Sound Sync Logic
        soundToggle.addEventListener('change', (e) => {
            soundStatus.textContent = e.target.checked ? "Ring volume at 80%" : "Muted / Vibrate only";
        });

        // Live Filtering
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('#settings-app .settings-item').forEach(item => {
                const text = item.querySelector('.settings-item-text').textContent.toLowerCase();
                item.style.display = text.includes(query) ? 'flex' : 'none';
            });
        });

        // Matrix Coordinate Transforms Setup
        function setAppWindowPositions() {
            const screenRect = screen.getBoundingClientRect();

            const iconRect = targetIcon.getBoundingClientRect();
            const localLeft = iconRect.left - screenRect.left;
            const localTop = iconRect.top - screenRect.top;
            const scaleX = iconRect.width / screenRect.width;
            const scaleY = iconRect.height / screenRect.height;
            settingsTransformState = `translate(${localLeft}px, ${localTop}px) scale(${scaleX}, ${scaleY})`;
            
            if (!isAppOpen || activeApp !== settingsApp) {
                settingsApp.style.transform = settingsTransformState;
                settingsApp.style.borderRadius = "12px";
            }

            const app2Rect = app2Icon.getBoundingClientRect();
            const app2LocalLeft = app2Rect.left - screenRect.left;
            const app2LocalTop = app2Rect.top - screenRect.top;
            const app2ScaleX = app2Rect.width / screenRect.width;
            const app2ScaleY = app2Rect.height / screenRect.height;
            app2TransformState = `translate(${app2LocalLeft}px, ${app2LocalTop}px) scale(${app2ScaleX}, ${app2ScaleY})`;

            if (!isAppOpen || activeApp !== app2App) {
                app2App.style.transform = app2TransformState;
                app2App.style.borderRadius = "12px";
            }
        }
        
        setTimeout(setAppWindowPositions, 200);
        window.addEventListener('resize', setAppWindowPositions);

        // Open App Logic
        function openApp(appTarget) {
            if (isDraggingIcon) return; 
            setAppWindowPositions();
            appTarget.getBoundingClientRect(); 
            activeApp = appTarget;
            isAppOpen = true;
            screen.classList.add('app-open');
            appTarget.classList.add('open');
        }

        // 0.50 Seconds Tap & Hold To Drag Engine Configuration
        let holdTimer = null;
        let isDraggingIcon = false;
        let activeDragElement = null;
        let dragOffset = { x: 0, y: 0 };
        let holdTriggered = false; 

        document.querySelectorAll('.draggable-icon').forEach(element => {
            
            const startPress = (clientX, clientY) => {
                if (isAppOpen) return;
                holdTriggered = false;
                
                element.classList.add('hold-active');
                holdTimer = setTimeout(() => {
                    holdTriggered = true;
                    isDraggingIcon = true;
                    activeDragElement = element;
                    element.classList.remove('hold-active');
                    element.classList.add('dragging');
                    
                    // Center pointer inside element to feel premium
                    const rect = element.getBoundingClientRect();
                    dragOffset.x = clientX - rect.left;
                    dragOffset.y = clientY - rect.top;
                    
                    moveIcon(clientX, clientY);
                }, 500); // Strict 0.50 seconds threshold target
            };

            const moveIcon = (clientX, clientY) => {
                if (!isDraggingIcon || activeDragElement !== element) return;
                const screenRect = screen.getBoundingClientRect();
                
                // Track finger coordinates relative to parent display wrapper container
                let localX = clientX - screenRect.left - dragOffset.x;
                let localY = clientY - screenRect.top - dragOffset.y;
                
                // CRITICAL: Bezel Collision Detection Engine (Strict boundaries)
                const maxLeft = screenRect.width - element.offsetWidth;
                const maxTop = screenRect.height - element.offsetHeight;
                
                if (localX < 0) localX = 0;
                if (localX > maxLeft) localX = maxLeft;
                if (localY < 0) localY = 0;
                if (localY > maxTop) localY = maxTop;
                
                element.style.left = `${localX}px`;
                element.style.top = `${localY}px`;
            };

            const endPress = () => {
                clearTimeout(holdTimer);
                element.classList.remove('hold-active');
                
                if (!holdTriggered && !isDraggingIcon) {
                    // Quick Single tap handler routed instantly
                    if (element.id === 'settings-trigger') openApp(settingsApp);
                    if (element.id === 'app2-trigger') openApp(app2App);
                }

                if (isDraggingIcon && activeDragElement === element) {
                    isDraggingIcon = false;
                    element.classList.remove('dragging');
                    activeDragElement = null;
                    setAppWindowPositions();
                }
            };

            // Touch events
            element.addEventListener('touchstart', (e) => {
                startPress(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: true });

            window.addEventListener('touchmove', (e) => {
                if (isDraggingIcon && activeDragElement === element) {
                    moveIcon(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: false });

            window.addEventListener('touchend', endPress);

            // Mouse events
            element.addEventListener('mousedown', (e) => {
                startPress(e.clientX, e.clientY);
                
                const mouseMoveHandler = (moveEvent) => {
                    moveIcon(moveEvent.clientX, moveEvent.clientY);
                };
                
                const mouseUpHandler = () => {
                    endPress();
                    window.removeEventListener('mousemove', mouseMoveHandler);
                    window.removeEventListener('mouseup', mouseUpHandler);
                };
                
                window.addEventListener('mousemove', mouseMoveHandler);
                window.addEventListener('mouseup', mouseUpHandler);
            });
        });

        // Gesture Navigation System Bar Transitions Engine
        navBar.addEventListener('touchstart', (e) => { 
            if (isAppOpen) { 
                startY = e.touches[0].clientY; 
                currentY = startY; 
                initDrag(); 
            } 
        }, { passive: true });
        
        navBar.addEventListener('touchmove', (e) => { 
            if (isDragging) { 
                currentY = e.touches[0].clientY; 
                let deltaY = startY - currentY;
                
                if (deltaY > 0) {
                    if (e.cancelable) e.preventDefault();
                    let scaleFactor = Math.max(0.75, 1 - (deltaY / 600));
                    let radiusFactor = Math.min(38, 28 + (deltaY / 12));
                    activeApp.style.transform = `translateY(${-deltaY}px) scale(${scaleFactor})`;
                    activeApp.style.borderRadius = `${radiusFactor}px`;
                    gestureLine.style.transform = `translateY(${-deltaY * 0.25}px)`;
                }
            } 
        }, { passive: false });
        
        navBar.addEventListener('touchend', () => { 
            if (isDragging) {
                isDragging = false;
                activeApp.classList.remove('dragging');
                let deltaY = startY - currentY;
                
                if (deltaY > 75) { 
                    closeActiveApp(); 
                } else {
                    activeApp.style.transform = '';
                    activeApp.style.borderRadius = '';
                    gestureLine.style.transform = '';
                }
            }
        });
        
        navBar.addEventListener('mousedown', (e) => {
            if (!isAppOpen) return;
            startY = e.clientY; 
            currentY = startY;
            initDrag();
            
            document.onmousemove = (event) => { 
                currentY = event.clientY; 
                let deltaY = startY - currentY;
                if (deltaY > 0) {
                    let scaleFactor = Math.max(0.75, 1 - (deltaY / 600));
                    activeApp.style.transform = `translateY(${-deltaY}px) scale(${scaleFactor})`;
                }
            };
            
            document.onmouseup = () => { 
                document.onmousemove = null; 
                document.onmouseup = null; 
                isDragging = false;
                activeApp.classList.remove('dragging');
                if ((startY - currentY) > 75) { 
                    closeActiveApp(); 
                } else {
                    activeApp.style.transform = '';
                }
            };
        });

        function initDrag() { isDragging = true; activeApp.classList.add('dragging'); }

        function closeActiveApp() {
            isAppOpen = false;
            screen.classList.remove('app-open');
            activeApp.classList.remove('open');
            
            searchBar.value = '';
            searchBar.blur();
            document.querySelectorAll('#settings-app .settings-item').forEach(i => i.style.display = 'flex');
            
            activeApp.style.transform = (activeApp === settingsApp) ? settingsTransformState : app2TransformState;
            activeApp.style.borderRadius = "12px";
            gestureLine.style.transform = '';
            activeApp = null;
        }
    </script>
</body>
</html>
