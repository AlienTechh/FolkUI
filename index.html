<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FolkUI Emulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        /* Phone Frame */
        .phone-frame {
            width: 375px;
            height: 712px;
            background-color: #000;
            border: 12px solid #2d2d30;
            border-radius: 44px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            outline: 2px solid #1a1a1c;
        }

        /* Screen Wrapper */
        .screen {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            background-image: url('https://preview.redd.it/tz6jhopl0d5h1.jpeg?width=640&crop=smart&auto=webp&s=8fc4a8f82d8652dc2437a1ef6df146e444e00f5b');
            background-size: cover;
            background-position: center;
        }

        /* Status Bar Simulation */
        .status-bar {
            height: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 14px;
            font-weight: 600;
            position: absolute;
            top: 0;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        /* Home Screen Layout */
        .home-screen {
            width: 100%;
            height: 100%;
            padding: 60px 24px 24px 24px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 22px;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .icon-shape {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .app-icon:active .icon-shape {
            transform: scale(0.9);
        }

        .icon-shape.settings {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .app-label {
            margin-top: 8px;
            font-size: 12px;
            text-align: center;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* Fixed Geometric Window Scaling using transform-origin matching */
        .app-window {
            position: absolute;
            z-index: 5;
            background-color: #1c1c1e;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 32px;
            
            /* Start state: zero scale, completely invisible */
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            overflow: hidden;
            
            /* Smooth 1.0s non-bouncy animation */
            transition: transform 1.0s cubic-bezier(0.25, 1, 0.5, 1),
                        border-radius 1.0s cubic-bezier(0.25, 1, 0.5, 1),
                        opacity 0.8s ease;
        }

        /* Active State */
        .app-window.active {
            opacity: 1;
            transform: scale(1);
            border-radius: 0px; 
            pointer-events: auto;
        }

        /* Content scaling control */
        .app-content {
            width: 100%;
            height: 100%;
            padding-top: 60px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .app-window.active .app-content {
            opacity: 1;
        }

        .settings-header {
            padding: 0 24px 16px 24px;
            font-size: 28px;
            font-weight: 700;
            border-bottom: 1px solid #2c2c2e;
        }

        .settings-menu {
            list-style: none;
            padding: 12px 24px;
        }

        .settings-item {
            padding: 16px 0;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 16px;
        }

        /* Bottom Swipe Gesture Zone */
        .gesture-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            z-index: 100;
            touch-action: none;
        }

        .gesture-line {
            width: 135px;
            height: 5px;
            background-color: #ffffff;
            border-radius: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="screen">
            
            <div class="status-bar">
                <span>9:41</span>
                <span>FolkUI</span>
            </div>

            <div class="home-screen">
                <div class="app-icon" id="settings-icon">
                    <div class="icon-shape settings">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </div>
                    <div class="app-label">Settings</div>
                </div>
            </div>

            <div class="app-window" id="settings-app">
                <div class="app-content">
                    <div class="settings-header">Settings</div>
                    <ul class="settings-menu">
                        <li class="settings-item"><span>Wi-Fi</span><span style="color:#8e8e93">FolkNet ›</span></li>
                        <li class="settings-item"><span>Bluetooth</span><span style="color:#8e8e93">On ›</span></li>
                        <li class="settings-item"><span>Display & Brightness</span><span>›</span></li>
                        <li class="settings-item"><span>About FolkUI</span><span>›</span></li>
                    </ul>
                </div>

                <div class="gesture-zone" id="gesture-bar">
                    <div class="gesture-line"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const settingsIcon = document.getElementById('settings-icon');
        const iconShape = settingsIcon.querySelector('.icon-shape');
        const settingsApp = document.getElementById('settings-app');
        const gestureBar = document.getElementById('gesture-bar');
        const phoneScreen = document.querySelector('.screen');

        let startY = 0;
        let isDragging = false;

        // Directly calculates and shifts the window's transform origin directly onto the center point of the icon
        function recalculateTransformOrigin() {
            const iconRect = iconShape.getBoundingClientRect();
            const screenRect = phoneScreen.getBoundingClientRect();

            // Calculate exact center coordinates relative to the screen bounds
            const xOrigin = (iconRect.left + (iconRect.width / 2)) - screenRect.left;
            const yOrigin = (iconRect.top + (iconRect.height / 2)) - screenRect.top;

            settingsApp.style.transformOrigin = `${xOrigin}px ${yOrigin}px`;
        }

        // Set origin points on boot
        window.addEventListener('load', recalculateTransformOrigin);
        window.addEventListener('resize', recalculateTransformOrigin);

        // Open app action
        settingsIcon.addEventListener('click', () => {
            recalculateTransformOrigin();
            
            // Clean dynamic runtime styles
            settingsApp.style.transform = '';
            settingsApp.style.borderRadius = '';
            settingsApp.style.opacity = '';
            
            // Reapply CSS master transitions timeline layout
            settingsApp.style.transition = 'transform 1.0s cubic-bezier(0.25, 1, 0.5, 1), border-radius 1.0s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease';
            
            settingsApp.getBoundingClientRect(); // Layout engine flush
            settingsApp.classList.add('active');
        });

        // Touch tracking configuration
        gestureBar.addEventListener('mousedown', startDrag);
        gestureBar.addEventListener('touchstart', startDrag);

        window.addEventListener('mousemove', doDrag);
        window.addEventListener('touchmove', doDrag);

        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            settingsApp.style.transition = 'none'; // Kill animations during layout drags
        }

        function doDrag(e) {
            if (!isDragging) return;
            
            const currentY = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaY = currentY - startY;

            if (deltaY < 0) {
                const screenHeight = phoneScreen.clientHeight;
                // Calculate scale shift from current finger drag displacement
                const progress = Math.min(Math.abs(deltaY) / (screenHeight * 0.5), 1);
                
                const calculatedScale = 1 - (progress * 0.5);
                const calculatedBorder = progress * 32;

                settingsApp.style.transform = `scale(${calculatedScale})`;
                settingsApp.style.borderRadius = `${calculatedBorder}px`;
                settingsApp.style.opacity = 1 - (progress * 0.4);
            }
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            settingsApp.style.transition = 'transform 1.0s cubic-bezier(0.25, 1, 0.5, 1), border-radius 1.0s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.0s cubic-bezier(0.25, 1, 0.5, 1)';
            
            const currentY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const deltaY = currentY - startY;

            if (deltaY < -60) {
                // Swipe trigger achieved: remove active status class, shrink to transform-origin point
                settingsApp.classList.remove('active');
                settingsApp.style.transform = 'scale(0)';
                settingsApp.style.borderRadius = '32px';
                settingsApp.style.opacity = '0';
            } else {
                // Snap safely back to operational full scale layout
                settingsApp.style.transform = 'scale(1)';
                settingsApp.style.borderRadius = '0px';
                settingsApp.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
