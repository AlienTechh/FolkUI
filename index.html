<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium FolkUI Emulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        body {
            background: radial-gradient(circle at center, #1e1e2f 0%, #0a0a0f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* ultra-premium Phone Frame with subtle depth shading */
        .phone-frame {
            width: 320px;
            height: 640px;
            background-color: #000;
            border: 12px solid #1c1c1e;
            border-radius: 42px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.85), 
                        0 0 0 1px rgba(255, 255, 255, 0.05),
                        inset 0 0 8px rgba(255,255,255,0.2);
        }

        /* Dynamic Island / Hardware Punch Hole combination */
        .camera-island {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 22px;
            background-color: #000;
            border-radius: 20px;
            z-index: 110;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 2px rgba(255,255,255,0.1);
        }

        .camera-lens {
            width: 10px;
            height: 10px;
            background: #0d0d1a;
            border-radius: 50%;
            position: absolute;
            right: 12px;
            box-shadow: inset 0 0 3px #1a73e8;
        }

        /* Screen Wrapper */
        .screen {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 30px;
            overflow: hidden;
            background-color: #000;
        }

        /* Premium Abstract Gradient Wallpaper Layout */
        .wallpaper-bg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: linear-gradient(145deg, #af40ff, #5b42f3 40%, #00d2ff);
            z-index: 1;
            transform: scale(1);
            will-change: transform;
        }

        .wallpaper-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.15), transparent 50%),
                        linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.4));
            z-index: 2;
        }

        /* Status Bar */
        .status-bar {
            height: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 22px 0 22px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: -0.2px;
            position: absolute;
            top: 0;
            z-index: 100;
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        .status-right {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .battery-icon {
            width: 18px;
            height: 9px;
            border: 1px solid white;
            border-radius: 3px;
            padding: 1px;
            display: flex;
        }
        .battery-level {
            width: 85%;
            height: 100%;
            background-color: white;
            border-radius: 1px;
        }

        /* Home Screen Container */
        .home-screen {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            padding: 65px 22px 24px 22px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 20px;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .icon-shape {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.35), 
                        inset 0 1px 1px rgba(255,255,255,0.2);
            transition: transform 0.12s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .app-icon:active .icon-shape {
            transform: scale(0.88);
        }

        .icon-shape.settings {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.08) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .app-label {
            margin-top: 7px;
            font-size: 11px;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.1px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
        }

        /* Glassmorphism System Interface Window */
        .app-window {
            position: absolute;
            z-index: 50;
            background-color: #000000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            overflow: hidden;
            will-change: transform, opacity, border-radius;
        }

        .app-content {
            width: 100%;
            height: 100%;
            padding-top: 65px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a24, #0f0f15);
        }

        .settings-header {
            padding: 0 24px 16px 24px;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .settings-menu {
            list-style: none;
            padding: 4px 16px;
        }

        .settings-item {
            padding: 16px 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .settings-item span:last-child {
            color: #8e8e93;
            font-weight: 400;
        }

        /* Fluid Gesture Navigation Zone - HIGH LAYER FIX */
        .gesture-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 38px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            z-index: 999; /* Forces layer layout above absolutely everything */
            touch-action: none;
            cursor: grab;
        }

        .gesture-line {
            width: 115px;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 10px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="camera-island">
            <div class="camera-lens"></div>
        </div>
        
        <div class="screen">
            <div class="wallpaper-bg" id="phone-wp">
                <div class="wallpaper-overlay"></div>
            </div>
            
            <div class="status-bar">
                <span>9:41</span>
                <div class="status-right">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.22 19.58 10.57 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
                    <div class="battery-icon"><div class="battery-level"></div></div>
                </div>
            </div>

            <div class="home-screen">
                <div class="app-icon" id="settings-icon">
                    <div class="icon-shape settings">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </div>
                    <div class="app-label">Settings</div>
                </div>
            </div>

            <div class="app-window" id="settings-app">
                <div class="app-content">
                    <div class="settings-header">Settings</div>
                    <ul class="settings-menu">
                        <li class="settings-item"><span>Wi-Fi</span><span>FolkNet Pro ›</span></li>
                        <li class="settings-item"><span>Bluetooth</span><span>Connected ›</span></li>
                        <li class="settings-item"><span>Wallpaper Style</span><span>Fluid Glass ›</span></li>
                        <li class="settings-item"><span>System Version</span><span>FolkUI 4.0 ›</span></li>
                    </ul>
                </div>
            </div>

            <div class="gesture-zone" id="gesture-bar">
                <div class="gesture-line"></div>
            </div>

        </div>
    </div>

    <script>
        const settingsIcon = document.getElementById('settings-icon');
        const iconShape = settingsIcon.querySelector('.icon-shape');
        const settingsApp = document.getElementById('settings-app');
        const gestureBar = document.getElementById('gesture-bar');
        const phoneScreen = document.querySelector('.screen');
        const wallpaperBg = document.getElementById('phone-wp');

        let startY = 0;
        let isDragging = false;
        let isAppOpen = false;

        function recalculateTransformOrigin() {
            const iconRect = iconShape.getBoundingClientRect();
            const screenRect = phoneScreen.getBoundingClientRect();
            const xOrigin = (iconRect.left + (iconRect.width / 2)) - screenRect.left;
            const yOrigin = (iconRect.top + (iconRect.height / 2)) - screenRect.top;
            settingsApp.style.transformOrigin = `${xOrigin}px ${yOrigin}px`;
        }

        window.addEventListener('load', recalculateTransformOrigin);
        window.addEventListener('resize', recalculateTransformOrigin);

        settingsIcon.addEventListener('click', () => {
            if (isAppOpen) return; 
            isAppOpen = true;
            
            recalculateTransformOrigin();
            settingsApp.style.pointerEvents = 'auto';
            
            settingsApp.style.transition = 'transform 1.0s cubic-bezier(0.25, 1, 0.5, 1), border-radius 1.0s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease';
            wallpaperBg.style.transition = 'transform 1.0s cubic-bezier(0.25, 1, 0.5, 1)';
            
            settingsApp.style.transform = 'scale(1)';
            settingsApp.style.borderRadius = '0px';
            settingsApp.style.opacity = '1';
            wallpaperBg.style.transform = 'scale(1.12)';
        });

        gestureBar.addEventListener('mousedown', startDrag);
        gestureBar.addEventListener('touchstart', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('touchmove', doDrag);
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        function startDrag(e) {
            if (!isAppOpen) return;
            isDragging = true;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            
            settingsApp.style.transition = 'none'; 
            wallpaperBg.style.transition = 'none';
        }

        function doDrag(e) {
            if (!isDragging) return;
            const currentY = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaY = currentY - startY;

            if (deltaY > 0) {
                const screenHeight = phoneScreen.clientHeight;
                const progress = Math.min(deltaY / (screenHeight * 0.4), 1);
                
                settingsApp.style.transform = `scale(${1 - (progress * 0.45)}) translateY(${deltaY * 0.35}px)`;
                settingsApp.style.borderRadius = `${progress * 30}px`;
                settingsApp.style.opacity = `${1 - (progress * 0.5)}`;
                wallpaperBg.style.transform = `scale(${1.12 - (progress * 0.12)})`;
            }
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            settingsApp.style.transition = 'transform 1.0s cubic-bezier(0.25, 1, 0.5, 1), border-radius 1.0s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.0s cubic-bezier(0.25, 1, 0.5, 1)';
            wallpaperBg.style.transition = 'transform 1.0s cubic-bezier(0.25, 1, 0.5, 1)';
            
            const currentY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const deltaY = currentY - startY;

            if (deltaY > 50) {
                isAppOpen = false;
                settingsApp.style.pointerEvents = 'none';
                
                settingsApp.style.transform = 'scale(0)';
                settingsApp.style.borderRadius = '30px';
                settingsApp.style.opacity = '0';
                wallpaperBg.style.transform = 'scale(1)';
            } else {
                settingsApp.style.transform = 'scale(1)';
                settingsApp.style.borderRadius = '0px';
                settingsApp.style.opacity = '1';
                wallpaperBg.style.transform = 'scale(1.12)';
            }
        }
    </script>
</body>
</html>
