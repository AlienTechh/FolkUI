<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium FolkUI Emulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        body {
            background: radial-gradient(circle at center, #1e1e2f 0%, #0a0a0f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .phone-frame {
            width: 320px;
            height: 640px;
            background-color: #000;
            border: 12px solid #1c1c1e;
            border-radius: 42px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.85);
        }

        .camera-island {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 22px;
            background-color: #000;
            border-radius: 20px;
            z-index: 110;
            pointer-events: none;
        }

        .screen {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 30px;
            overflow: hidden;
            background-color: #000;
        }

        .wallpaper-bg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: linear-gradient(145deg, #af40ff, #5b42f3 40%, #00d2ff);
            z-index: 1;
            transform: scale(1);
            will-change: transform;
        }

        .status-bar {
            height: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 22px 0 22px;
            font-size: 11px;
            font-weight: 600;
            position: absolute;
            top: 0;
            z-index: 100;
            pointer-events: none;
        }

        .home-screen {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            padding: 65px 22px 24px 22px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 20px;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .icon-shape {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.35);
        }

        .icon-shape.settings {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.08) 100%);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .app-label {
            margin-top: 7px;
            font-size: 11px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
        }

        .app-window {
            position: absolute;
            z-index: 50;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            overflow: hidden;
            will-change: transform, opacity, border-radius;
        }

        .app-content {
            width: 100%;
            height: 100%;
            padding-top: 65px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #1a1a24, #0f0f15);
        }

        .settings-header {
            padding: 0 24px 16px 24px;
            font-size: 26px;
            font-weight: 700;
        }

        .settings-menu {
            list-style: none;
            padding: 4px 16px;
        }

        .settings-item {
            padding: 16px 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .gesture-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            z-index: 999; 
            cursor: grab;
        }

        .gesture-line {
            width: 115px;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="camera-island"></div>
        
        <div class="screen">
            <div class="wallpaper-bg" id="phone-wp"></div>
            
            <div class="status-bar">
                <span>9:41</span>
                <span>100%</span>
            </div>

            <div class="home-screen">
                <div class="app-icon" id="settings-icon">
                    <div class="icon-shape settings">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </div>
                    <div class="app-label">Settings</div>
                </div>
            </div>

            <div class="app-window" id="settings-app">
                <div class="app-content">
                    <div class="settings-header">Settings</div>
                    <ul class="settings-menu">
                        <li class="settings-item"><span>Wi-Fi</span><span>Connected ›</span></li>
                        <li class="settings-item"><span>Bluetooth</span><span>On ›</span></li>
                    </ul>
                </div>
            </div>

            <div class="gesture-zone" id="gesture-bar">
                <div class="gesture-line"></div>
            </div>

        </div>
    </div>

    <script>
        const settingsIcon = document.getElementById('settings-icon');
        const iconShape = settingsIcon.querySelector('.icon-shape');
        const settingsApp = document.getElementById('settings-app');
        const gestureBar = document.getElementById('gesture-bar');
        const phoneScreen = document.querySelector('.screen');
        const wallpaperBg = document.getElementById('phone-wp');

        let startY = 0;
        let isDragging = false;

        function setOrigin() {
            const iconRect = iconShape.getBoundingClientRect();
            const screenRect = phoneScreen.getBoundingClientRect();
            settingsApp.style.transformOrigin = `${(iconRect.left + iconRect.width/2) - screenRect.left}px ${(iconRect.top + iconRect.height/2) - screenRect.top}px`;
        }

        settingsIcon.addEventListener('click', () => {
            setOrigin();
            settingsApp.style.pointerEvents = 'auto';
            settingsApp.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-radius 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease';
            wallpaperBg.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            
            settingsApp.style.transform = 'scale(1) translateY(0px)';
            settingsApp.style.borderRadius = '0px';
            settingsApp.style.opacity = '1';
            wallpaperBg.style.transform = 'scale(1.12)';
        });

        function closeApp() {
            settingsApp.style.pointerEvents = 'none';
            settingsApp.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-radius 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease';
            wallpaperBg.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            
            settingsApp.style.transform = 'scale(0) translateY(0px)';
            settingsApp.style.borderRadius = '30px';
            settingsApp.style.opacity = '0';
            wallpaperBg.style.transform = 'scale(1)';
        }

        gestureBar.addEventListener('mousedown', startDrag);
        gestureBar.addEventListener('touchstart', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('touchmove', doDrag, { passive: false });
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            gestureBar.style.cursor = 'grabbing';
        }

        function doDrag(e) {
            if (!isDragging) return;
            // Visual changes are disabled during swipe up. Window stays completely frozen.
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            gestureBar.style.cursor = 'grab';
            
            const currentY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const deltaY = currentY - startY;

            // Instantly snaps cleanly into the icon if you cross the upward threshold
            if (deltaY < -60) {
                closeApp();
            }
        }
    </script>
</body>
</html>
